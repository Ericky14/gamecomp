name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: go-task/setup-task@v1
      - uses: actions/checkout@v4
      - run: task docker:run TARGET=fmt:check

  lint:
    name: Clippy
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: go-task/setup-task@v1
      - uses: actions/checkout@v4
      - run: task docker:run TARGET=lint

  test:
    name: Test
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: go-task/setup-task@v1
      - uses: actions/checkout@v4
      - run: task docker:run TARGET=test

  build:
    name: Build Release
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: go-task/setup-task@v1
      - uses: actions/checkout@v4
      - run: task docker:run TARGET=build
